<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Star field */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.4); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 4rem;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5);
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Glowing gradient headline */
    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399, #fbbf24);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
      filter: drop-shadow(0 0 24px rgba(167, 139, 250, 0.6));
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    p.subtitle {
      margin-top: 1rem;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Animated ring */
    .ring-wrapper {
      margin: 2rem auto 0;
      width: 80px;
      height: 80px;
      position: relative;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
    }

    .ring:nth-child(1) {
      border-top-color: #a78bfa;
      animation: spin 1.2s linear infinite;
    }

    .ring:nth-child(2) {
      inset: 10px;
      border-right-color: #60a5fa;
      animation: spin 1.8s linear infinite reverse;
    }

    .ring:nth-child(3) {
      inset: 20px;
      border-bottom-color: #34d399;
      animation: spin 2.4s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Procedurally generated star field -->
  <div class="stars" id="stars"></div>

  <div class="card">
    <h1>Hello, World!</h1>
    <p class="subtitle">Welcome to my GitHub Pages</p>
    <div class="ring-wrapper">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
  </div>

  <script>
    // Generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 200; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        --d: ${(Math.random() * 3 + 1).toFixed(2)}s;
        animation-delay: ${(Math.random() * 3).toFixed(2)}s;
      `;
      container.appendChild(star);
    }
  </script>
</body>
</html>
